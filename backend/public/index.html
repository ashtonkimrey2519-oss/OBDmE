<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OBDmE</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0a0a0a;
      --surface: #111111;
      --surface2: #1a1a1a;
      --border: #2a2a2a;
      --accent: #e8ff00;
      --accent2: #ff4d00;
      --text: #f0f0f0;
      --muted: #666;
      --success: #00ff88;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      overflow-x: hidden;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 0;
      opacity: 0.4;
    }

    body::after {
      content: '';
      position: fixed;
      top: -200px;
      left: 50%;
      transform: translateX(-50%);
      width: 600px;
      height: 400px;
      background: radial-gradient(ellipse, rgba(232,255,0,0.07) 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
    }

    header {
      width: 100%;
      max-width: 480px;
      padding: 48px 24px 0;
      position: relative;
      z-index: 1;
      animation: fadeDown 0.6s ease both;
    }

    .logo-row {
      display: flex;
      align-items: baseline;
      gap: 10px;
      margin-bottom: 6px;
    }

    .logo {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 64px;
      letter-spacing: 2px;
      color: var(--accent);
      line-height: 1;
    }

    .logo-sub {
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      color: var(--muted);
      letter-spacing: 3px;
      text-transform: uppercase;
      margin-bottom: 2px;
    }

    .tagline {
      font-size: 13px;
      color: var(--muted);
      font-weight: 300;
      letter-spacing: 0.5px;
    }

    .divider {
      width: 100%;
      max-width: 480px;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--border), transparent);
      margin: 28px 0;
      position: relative;
      z-index: 1;
      animation: fadeIn 0.8s ease 0.2s both;
    }

    main {
      width: 100%;
      max-width: 480px;
      padding: 0 24px;
      position: relative;
      z-index: 1;
      animation: fadeUp 0.6s ease 0.1s both;
    }

    .input-block {
      margin-bottom: 12px;
    }

    label {
      display: block;
      font-family: 'DM Mono', monospace;
      font-size: 10px;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 8px;
    }

    input[type="text"] {
      width: 100%;
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text);
      font-family: 'DM Mono', monospace;
      font-size: 16px;
      padding: 14px 16px;
      border-radius: 6px;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
      letter-spacing: 1px;
    }

    input[type="text"]::placeholder {
      color: #333;
    }

    input[type="text"]:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 2px rgba(232,255,0,0.08);
    }

    .btn-analyze {
      width: 100%;
      margin-top: 16px;
      padding: 16px;
      background: var(--accent);
      color: #000;
      border: none;
      border-radius: 6px;
      font-family: 'Bebas Neue', sans-serif;
      font-size: 22px;
      letter-spacing: 3px;
      cursor: pointer;
      transition: transform 0.15s, box-shadow 0.15s, background 0.15s;
      position: relative;
      overflow: hidden;
    }

    .btn-analyze::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(255,255,255,0.1) 0%, transparent 60%);
    }

    .btn-analyze:hover {
      background: #f5ff33;
      box-shadow: 0 0 24px rgba(232,255,0,0.3);
      transform: translateY(-1px);
    }

    .btn-analyze:active {
      transform: translateY(0);
      box-shadow: none;
    }

    .btn-analyze.loading {
      background: var(--surface2);
      color: var(--muted);
      cursor: not-allowed;
    }

    #result {
      margin-top: 28px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      overflow: hidden;
      opacity: 0;
      transform: translateY(12px);
      transition: opacity 0.4s ease, transform 0.4s ease;
    }

    #result.visible {
      opacity: 1;
      transform: translateY(0);
    }

    #result.hidden { display: none; }

    .result-header {
      padding: 20px 20px 16px;
      border-bottom: 1px solid var(--border);
      background: var(--surface2);
    }

    .code-badge {
      display: inline-block;
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 2px;
      color: #000;
      background: var(--accent);
      padding: 3px 8px;
      border-radius: 3px;
      margin-bottom: 10px;
    }

    .code-badge.error-badge {
      background: var(--accent2);
      color: #fff;
    }

    #issue {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 28px;
      letter-spacing: 1px;
      line-height: 1.1;
      color: var(--text);
    }

    .result-body {
      padding: 20px;
    }

    .result-section {
      margin-bottom: 20px;
    }

    .result-section:last-child { margin-bottom: 0; }

    .section-label {
      font-family: 'DM Mono', monospace;
      font-size: 9px;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 8px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .section-label::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    #explanation {
      font-size: 14px;
      line-height: 1.7;
      color: #b0b0b0;
      font-weight: 300;
    }

    #steps, #shops {
      list-style: none;
      padding: 0;
    }

    #steps li, #shops li {
      padding: 9px 0;
      font-size: 13px;
      color: #c0c0c0;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 10px;
    }

    #steps li:last-child, #shops li:last-child { border-bottom: none; }

    #steps li::before {
      content: '';
      width: 6px;
      height: 6px;
      background: var(--accent);
      border-radius: 50%;
      flex-shrink: 0;
    }

    #shops li::before {
      content: '◈';
      color: var(--accent2);
      font-size: 12px;
      flex-shrink: 0;
    }

    .map-section {
      border-top: 1px solid var(--border);
      padding: 20px;
      display: none;
    }

    .map-section.visible {
      display: block;
    }

    #map-frame {
      width: 100%;
      height: 220px;
      border: none;
      border-radius: 8px;
      filter: grayscale(30%) contrast(1.1);
    }

    .status-bar {
      width: 100%;
      max-width: 480px;
      padding: 16px 24px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      position: relative;
      z-index: 1;
      margin-top: 40px;
      border-top: 1px solid var(--border);
    }

    .status-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--success);
      display: inline-block;
      margin-right: 6px;
      animation: pulse 2s infinite;
    }

    .status-text {
      font-family: 'DM Mono', monospace;
      font-size: 10px;
      color: var(--muted);
      letter-spacing: 1px;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }

    @keyframes fadeDown {
      from { opacity: 0; transform: translateY(-16px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .spinner {
      display: inline-block;
      width: 14px;
      height: 14px;
      border: 2px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      vertical-align: middle;
      margin-right: 6px;
    }
  </style>
</head>
<body>

<header>
  <p class="logo-sub">Honda Diagnostic System</p>
  <div class="logo-row">
    <span class="logo">OBDmE</span>
  </div>
  <p class="tagline">Enter an OBD-II fault code to decode what your car is telling you.</p>
</header>

<div class="divider"></div>

<main>
  <div class="input-block">
    <label for="code">Fault Code</label>
    <input type="text" id="code" placeholder="P0420" maxlength="6" autocomplete="off" spellcheck="false">
  </div>

  <div class="input-block">
    <label for="car">Vehicle (optional)</label>
    <input type="text" id="car" placeholder="e.g. 2015 Honda Civic" autocomplete="off">
  </div>

  <button class="btn-analyze" onclick="analyze()" id="analyzeBtn">Analyze</button>

  <div id="result" class="hidden">
    <div class="result-header">
      <div class="code-badge" id="codeBadge">—</div>
      <h3 id="issue"></h3>
    </div>
    <div class="result-body">
      <div class="result-section">
        <div class="section-label">Diagnosis</div>
        <p id="explanation"></p>
      </div>
      <div class="result-section">
        <div class="section-label">Next Steps</div>
        <ul id="steps"></ul>
      </div>
      <div class="result-section">
        <div class="section-label">Recommended Shop</div>
        <ul id="shops"></ul>
      </div>
    </div>
    <div class="map-section" id="mapSection">
      <div class="section-label">Shop Location</div>
      <iframe id="map-frame" allowfullscreen loading="lazy"></iframe>
    </div>
  </div>
</main>

<footer class="status-bar">
  <span class="status-text"><span class="status-dot"></span>API connected · obdme.onrender.com</span>
  <span class="status-text" id="codeCount">—</span>
</footer>

<script>
  let MAPS_API_KEY = '';

  fetch('/api/config')
    .then(r => r.json())
    .then(d => {
      MAPS_API_KEY = d.mapsApiKey;
      return fetch('/health');
    })
    .then(r => r.json())
    .then(d => {
      document.getElementById('codeCount').textContent = `${d.totalCodes.toLocaleString()} codes loaded`;
    })
    .catch(() => {
      document.getElementById('codeCount').textContent = 'backend offline';
      document.querySelector('.status-dot').style.background = '#ff4d00';
    });

  document.getElementById('code').addEventListener('keydown', e => {
    if (e.key === 'Enter') analyze();
  });

  function setLoading(on) {
    const btn = document.getElementById('analyzeBtn');
    if (on) {
      btn.innerHTML = '<span class="spinner"></span>Analyzing...';
      btn.classList.add('loading');
      btn.disabled = true;
    } else {
      btn.innerHTML = 'Analyze';
      btn.classList.remove('loading');
      btn.disabled = false;
    }
  }

  function analyze() {
    const code = document.getElementById('code').value.trim();
    if (!code) {
      document.getElementById('code').focus();
      return;
    }

    setLoading(true);
    hideResult();

    fetch(`/api/code/${encodeURIComponent(code)}`)
      .then(res => res.json())
      .then(data => {
        setLoading(false);
        displayResults(data, code.toUpperCase());
      })
      .catch(() => {
        setLoading(false);
        useMockData(code.toUpperCase());
      });
  }

  function hideResult() {
    const result = document.getElementById('result');
    result.classList.add('hidden');
    result.classList.remove('visible');
  }

  function showResult() {
    const result = document.getElementById('result');
    result.classList.remove('hidden');
    requestAnimationFrame(() => result.classList.add('visible'));
  }

  function loadMap(shopName) {
    const mapSection = document.getElementById('mapSection');
    const mapFrame = document.getElementById('map-frame');
    const query = encodeURIComponent(shopName + ' auto shop');
    mapFrame.src = `https://www.google.com/maps/embed/v1/search?key=${MAPS_API_KEY}&q=${query}`;
    mapSection.classList.add('visible');
  }

  function displayResults(data, rawCode) {
    const badge = document.getElementById('codeBadge');
    const issue = document.getElementById('issue');
    const explanation = document.getElementById('explanation');
    const steps = document.getElementById('steps');
    const shops = document.getElementById('shops');
    const mapSection = document.getElementById('mapSection');

    steps.innerHTML = '';
    shops.innerHTML = '';
    mapSection.classList.remove('visible');

    if (data.error) {
      badge.textContent = rawCode;
      badge.className = 'code-badge error-badge';
      issue.textContent = data.error;
      explanation.textContent = data.message;
      showResult();
      return;
    }

    badge.textContent = data.code;
    badge.className = 'code-badge';
    issue.textContent = data.category;
    explanation.textContent = data.summary;

    ['Inspect related components', 'Check for sensor issues', 'Consult a professional mechanic'].forEach(s => {
      const li = document.createElement('li');
      li.textContent = s;
      steps.appendChild(li);
    });

    const li = document.createElement('li');
    li.textContent = data.recommendedShop;
    shops.appendChild(li);

    loadMap(data.recommendedShop);
    showResult();
  }

  function useMockData(code) {
    if (code === 'P0420') {
      displayResults({
        code: 'P0420',
        category: 'Catalyst System',
        summary: 'Your catalytic converter may not be working properly. The efficiency has dropped below the acceptable threshold.',
        recommendedShop: "Joe's Auto Repair"
      }, code);
    } else {
      displayResults({ error: 'Backend Unavailable', message: 'Could not reach the backend server.' }, code);
    }
  }
</script>
</body>
</html>
